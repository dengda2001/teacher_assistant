<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生管理 - 教师助手</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #FDF8F3 0%, #F8F0E8 100%);
      color: #2C2C2C;
      line-height: 1.5;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function StudentsPage() {
      const [viewMode, setViewMode] = useState('grid');
      const [searchQuery, setSearchQuery] = useState('');

      const students = [
        { name: '张小明', id: '20240801', avatar: '明', tags: ['积极', '数学好'], score: 85, trend: 'up' },
        { name: '李小红', id: '20240802', avatar: '红', tags: ['文静', '语文好'], score: 92, trend: 'stable' },
        { name: '王小华', id: '20240803', avatar: '华', tags: ['活泼', '体育好'], score: 78, trend: 'up' },
        { name: '刘小强', id: '20240804', avatar: '强', tags: ['踏实', '进步快'], score: 88, trend: 'up' },
        { name: '陈小美', id: '20240805', avatar: '美', tags: ['细心', '英语好'], score: 95, trend: 'stable' },
        { name: '赵小龙', id: '20240806', avatar: '龙', tags: ['活跃', '组织强'], score: 82, trend: 'down' }
      ];

      const tags = ['全部', '积极', '文静', '活泼', '踏实', '进步快'];

      return (
        <div style={styles.container}>
          <div style={styles.orb1}></div>
          <div style={styles.orb2}></div>

          {/* Sidebar */}
          <aside style={styles.sidebar}>
            <div style={styles.sidebarHeader}>
              <div style={styles.logoIcon}>🌿</div>
              <div>
                <div style={styles.logoTitle}>教师助手</div>
                <div style={styles.logoSubtitle}>自然 · 从容</div>
              </div>
            </div>

            <nav style={styles.nav}>
              <div style={styles.navItem}>
                <span style={styles.navIcon}>🏠</span>
                <span>首页概览</span>
              </div>
              <div style={{...styles.navItem, background: 'rgba(196, 168, 130, 0.2)'}}>
                <span style={styles.navIcon}>👤</span>
                <span>学生管理</span>
              </div>
              <div style={styles.navItem}>
                <span style={styles.navIcon}>📝</span>
                <span>评语生成</span>
              </div>
              <div style={styles.navItem}>
                <span style={styles.navIcon}>📊</span>
                <span>成绩分析</span>
              </div>
              <div style={styles.navItem}>
                <span style={styles.navIcon}>⭐</span>
                <span>表现记录</span>
              </div>
            </nav>

            <div style={styles.sidebarFooter}>
              <div style={styles.userCard}>
                <div style={styles.userAvatar}>张</div>
                <div>
                  <div style={styles.userName}>张老师</div>
                  <div style={styles.userRole}>高三(1)班班主任</div>
                </div>
              </div>
            </div>
          </aside>

          {/* Main Content */}
          <main style={styles.main}>
            {/* Header */}
            <header style={styles.header}>
              <div>
                <h1 style={styles.pageTitle}>👤 学生管理</h1>
                <p style={styles.pageSubtitle}>共 48 名学生 · 管理学生信息和表现记录</p>
              </div>
              <button style={styles.primaryButton}>+ 添加学生</button>
            </header>

            {/* Search & Filter Bar */}
            <div style={styles.filterBar}>
              <div style={styles.searchBox}>
                <span style={styles.searchIcon}>🔍</span>
                <input
                  type="text"
                  placeholder="搜索学生姓名或学号..."
                  style={styles.searchInput}
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>
              <div style={styles.viewToggle}>
                <button
                  style={{...styles.viewBtn, background: viewMode === 'grid' ? '#C4A882' : 'transparent', color: viewMode === 'grid' ? 'white' : '#6B5B4F'}}
                  onClick={() => setViewMode('grid')}
                >
                  ⊞
                </button>
                <button
                  style={{...styles.viewBtn, background: viewMode === 'list' ? '#C4A882' : 'transparent', color: viewMode === 'list' ? 'white' : '#6B5B4F'}}
                  onClick={() => setViewMode('list')}
                >
                  ☰
                </button>
              </div>
            </div>

            {/* Tags Filter */}
            <div style={styles.tagsFilter}>
              {tags.map((tag, i) => (
                <button key={i} style={{...styles.tagBtn, background: i === 0 ? '#C4A882' : 'rgba(196, 168, 130, 0.15)', color: i === 0 ? 'white' : '#6B5B4F'}}>
                  {tag}
                </button>
              ))}
            </div>

            {/* Students Grid */}
            <div style={viewMode === 'grid' ? styles.studentsGrid : styles.studentsList}>
              {students.map((student, i) => (
                <div key={i} style={viewMode === 'grid' ? styles.studentCard : styles.studentRow}>
                  <div style={styles.studentMain}>
                    <div style={styles.studentAvatar}>{student.avatar}</div>
                    <div style={styles.studentInfo}>
                      <div style={styles.studentName}>{student.name}</div>
                      <div style={styles.studentId}>学号: {student.id}</div>
                    </div>
                  </div>

                  {viewMode === 'grid' ? (
                    <>
                      <div style={styles.studentTags}>
                        {student.tags.map((tag, j) => (
                          <span key={j} style={styles.tag}>{tag}</span>
                        ))}
                      </div>
                      <div style={styles.studentStats}>
                        <div style={styles.statBox}>
                          <div style={styles.statValueSmall}>{student.score}</div>
                          <div style={styles.statLabelSmall}>综合评分</div>
                        </div>
                        <div style={styles.trendIndicator}>
                          {student.trend === 'up' ? '📈' : student.trend === 'down' ? '📉' : '➡️'}
                        </div>
                      </div>
                    </>
                  ) : (
                    <>
                      <div style={styles.studentTagsRow}>
                        {student.tags.map((tag, j) => (
                          <span key={j} style={styles.tagSmall}>{tag}</span>
                        ))}
                      </div>
                      <div style={styles.studentScoreRow}>
                        <span style={styles.scoreValue}>{student.score}</span>
                        <span style={styles.trendSmall}>{student.trend === 'up' ? '📈' : student.trend === 'down' ? '📉' : '➡️'}</span>
                      </div>
                    </>
                  )}
                </div>
              ))}
            </div>
          </main>
        </div>
      );
    }

    const styles = {
      container: {
        display: 'flex',
        minHeight: '100vh',
        position: 'relative'
      },
      orb1: {
        position: 'fixed',
        width: '500px',
        height: '500px',
        borderRadius: '50%',
        background: 'radial-gradient(circle, rgba(232, 196, 168, 0.2) 0%, transparent 70%)',
        top: '-150px',
        right: '-100px',
        filter: 'blur(60px)',
        pointerEvents: 'none'
      },
      orb2: {
        position: 'fixed',
        width: '400px',
        height: '400px',
        borderRadius: '50%',
        background: 'radial-gradient(circle, rgba(197, 212, 184, 0.15) 0%, transparent 70%)',
        bottom: '-100px',
        left: '200px',
        filter: 'blur(60px)',
        pointerEvents: 'none'
      },
      sidebar: {
        width: '240px',
        background: 'rgba(255, 253, 250, 0.8)',
        backdropFilter: 'blur(20px)',
        borderRight: '1px solid rgba(255, 255, 255, 0.6)',
        padding: '24px 16px',
        display: 'flex',
        flexDirection: 'column',
        position: 'fixed',
        height: '100vh',
        zIndex: 10
      },
      sidebarHeader: {
        display: 'flex',
        alignItems: 'center',
        gap: '12px',
        padding: '8px 8px 20px',
        borderBottom: '1px solid rgba(0, 0, 0, 0.06)',
        marginBottom: '16px'
      },
      logoIcon: {
        width: '40px',
        height: '40px',
        borderRadius: '14px',
        background: 'linear-gradient(135deg, #C4A882 0%, #A8B89C 100%)',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        fontSize: '20px'
      },
      logoTitle: {
        fontFamily: '"Newsreader", serif',
        fontSize: '18px',
        fontWeight: 600
      },
      logoSubtitle: {
        fontSize: '12px',
        color: '#9B8B7B'
      },
      nav: {
        display: 'flex',
        flexDirection: 'column',
        gap: '4px',
        flex: 1
      },
      navItem: {
        display: 'flex',
        alignItems: 'center',
        gap: '12px',
        padding: '10px 14px',
        borderRadius: '12px',
        fontSize: '14px',
        cursor: 'pointer'
      },
      navIcon: {
        fontSize: '18px'
      },
      sidebarFooter: {
        marginTop: 'auto',
        paddingTop: '16px',
        borderTop: '1px solid rgba(0, 0, 0, 0.06)'
      },
      userCard: {
        display: 'flex',
        alignItems: 'center',
        gap: '12px',
        padding: '12px',
        background: 'rgba(255, 255, 255, 0.6)',
        borderRadius: '16px'
      },
      userAvatar: {
        width: '40px',
        height: '40px',
        borderRadius: '50%',
        background: 'linear-gradient(135deg, #C4A882 0%, #A8B89C 100%)',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        color: 'white',
        fontSize: '16px',
        fontWeight: 600
      },
      userName: { fontSize: '14px', fontWeight: 600 },
      userRole: { fontSize: '12px', color: '#9B8B7B' },
      main: {
        flex: 1,
        marginLeft: '240px',
        padding: '32px'
      },
      header: {
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
        marginBottom: '24px'
      },
      pageTitle: {
        fontFamily: '"Newsreader", serif',
        fontSize: '28px',
        fontWeight: 500,
        marginBottom: '4px'
      },
      pageSubtitle: {
        fontSize: '14px',
        color: '#9B8B7B'
      },
      primaryButton: {
        padding: '12px 24px',
        borderRadius: '14px',
        border: 'none',
        background: 'linear-gradient(135deg, #C4A882 0%, #A8B89C 100%)',
        color: 'white',
        fontSize: '14px',
        fontWeight: 600,
        cursor: 'pointer',
        boxShadow: '0 4px 16px rgba(196, 168, 130, 0.35)'
      },
      filterBar: {
        display: 'flex',
        gap: '16px',
        marginBottom: '16px'
      },
      searchBox: {
        flex: 1,
        display: 'flex',
        alignItems: 'center',
        gap: '12px',
        padding: '12px 16px',
        background: 'rgba(255, 253, 250, 0.7)',
        backdropFilter: 'blur(10px)',
        borderRadius: '14px',
        border: '1px solid rgba(255, 255, 255, 0.6)'
      },
      searchIcon: {
        fontSize: '18px',
        color: '#9B8B7B'
      },
      searchInput: {
        flex: 1,
        border: 'none',
        background: 'transparent',
        fontSize: '14px',
        outline: 'none',
        color: '#2C2C2C'
      },
      viewToggle: {
        display: 'flex',
        gap: '4px',
        padding: '4px',
        background: 'rgba(255, 253, 250, 0.7)',
        borderRadius: '12px',
        border: '1px solid rgba(255, 255, 255, 0.6)'
      },
      viewBtn: {
        padding: '8px 14px',
        borderRadius: '10px',
        border: 'none',
        fontSize: '16px',
        cursor: 'pointer',
        transition: 'all 0.2s ease'
      },
      tagsFilter: {
        display: 'flex',
        gap: '8px',
        marginBottom: '20px',
        flexWrap: 'wrap'
      },
      tagBtn: {
        padding: '8px 16px',
        borderRadius: '20px',
        border: 'none',
        fontSize: '13px',
        cursor: 'pointer',
        transition: 'all 0.2s ease'
      },
      studentsGrid: {
        display: 'grid',
        gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))',
        gap: '16px'
      },
      studentsList: {
        display: 'flex',
        flexDirection: 'column',
        gap: '12px'
      },
      studentCard: {
        background: 'rgba(255, 253, 250, 0.7)',
        backdropFilter: 'blur(10px)',
        borderRadius: '20px',
        padding: '20px',
        border: '1px solid rgba(255, 255, 255, 0.6)',
        boxShadow: '0 8px 32px rgba(0, 0, 0, 0.05)'
      },
      studentRow: {
        display: 'flex',
        alignItems: 'center',
        gap: '20px',
        padding: '16px 20px',
        background: 'rgba(255, 253, 250, 0.7)',
        backdropFilter: 'blur(10px)',
        borderRadius: '16px',
        border: '1px solid rgba(255, 255, 255, 0.6)'
      },
      studentMain: {
        display: 'flex',
        alignItems: 'center',
        gap: '14px'
      },
      studentAvatar: {
        width: '48px',
        height: '48px',
        borderRadius: '50%',
        background: 'linear-gradient(135deg, #E8C4A8 0%, #C5D4B8 100%)',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        fontSize: '18px',
        fontWeight: 600,
        color: 'white'
      },
      studentInfo: {
        flex: 1
      },
      studentName: {
        fontSize: '16px',
        fontWeight: 600,
        color: '#2C2C2C',
        marginBottom: '2px'
      },
      studentId: {
        fontSize: '13px',
        color: '#9B8B7B'
      },
      studentTags: {
        display: 'flex',
        gap: '6px',
        flexWrap: 'wrap',
        marginTop: '12px',

      tag: {

        background: 'rgba(196, 168, 130, 0.15)',

      studentStats: {

      statBox: {

      },
      statValueSmall: {

        color: '#C4A882'
      },
      statLabelSmall: {

      trendIndicator: {

      },
      studentTagsRow: {
        display: 'flex',
        gap: '6px'
      },
      tagSmall: {
        fontSize: '12px',
        padding: '3px 8px',
        background: 'rgba(196, 168, 130, 0.15)',
        borderRadius: '8px',
        color: '#6B5B4F'
      },
      studentScoreRow: {
        display: 'flex',
        alignItems: 'center',
        gap: '8px',
        marginLeft: 'auto'
      },
      scoreValue: {
        fontSize: '20px',
        fontWeight: 700,
        color: '#C4A882'
      },
      trendSmall: {
        fontSize: '16px'
      }
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<StudentsPage />);
  </script>
</body>
</html>
