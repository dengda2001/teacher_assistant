        avg: 262.4,
        max: 275,
        min: 248,

                <div style={styles.statValueBig}>{stats.max}</div>

                      <th style={styles.th}>语文</th>
                      <th style={styles.th}>数学</th>
                      <th style={styles.th}>英语</th>
                      <th style={styles.th}>总分</th>

                          </span>

                        <td style={styles.td}>

                            <div style={styles.miniAvatar}>{score.name[0]}</div>

                        <td style={styles.td}>

                          </span>

                        <td style={styles.td}>

                        { range: '80-89分', count: 20, pct: 42 },
                        { range: '70-79分', count: 10, pct: 21 },
                        { range: '60-69分', count: 4, pct: 8 },

                            <span>{item.range}</span>
                            <span style={styles.distCount}>{item.count}人</span>
                          </div>
                          <div style={styles.distBar}>
                            <div style={{...styles.distFill, width: `${item.pct}%`}}></div>
                          </div>

                    <div style={styles.blockHeader}>
                      <h2 style={styles.blockTitle}>🏆 进步之星</h2>
                    </div>
                    <div style={styles.improveList}>

                        { name: '刘小强', change: '+12', reason: '语文成绩提升' },

                            <div style={styles.improveReason}>{item.reason}</div>
                          </div>
                          <div style={styles.improveChange}>+{item.change}</div>
