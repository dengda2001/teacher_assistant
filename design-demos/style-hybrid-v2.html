    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #FDF8F3 0%, #F8F0E8 100%);
      color: #2C2C2C;
      line-height: 1.5;
      min-height: 100vh;
    }

      const [currentDate, setCurrentDate] = useState('');
      const [hoveredCard, setHoveredCard] = useState(null);

        setGreeting(hour < 12 ? '早上好' : hour < 18 ? '下午好' : '晚上好');
        const date = new Date();
        const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
        setCurrentDate(`${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${weekdays[date.getDay()]}`);

        { label: '记录', value: '156', desc: '条表现', icon: '✨', color: '#C5D4B8' },
        { label: '待评', value: '12', desc: '份评语', icon: '📝', color: '#F0D5C5' },

        { emoji: '✅', title: '导入期中成绩', desc: '数学、语文、英语三科', time: '2小时前', tag: '成绩' },
        { emoji: '💬', title: '生成学生评语', desc: '为15名学生生成评语', time: '5小时前', tag: '评语' },
        { emoji: '⭐', title: '添加表现记录', desc: '张小明同学的课堂表现', time: '1天前', tag: '记录' }
      ];

      const todos = [
        { text: '为张小明生成本学期评语', checked: false },
        { text: '导入本周数学测验成绩', checked: true },
        { text: '更新家长会材料', checked: false }
      ];

        { title: '期中家长会', date: '5月15日', type: '会议' },
        { title: '数学单元测', date: '5月10日', type: '考试' },

                        style={{
                          ...styles.statCard,
                          backgroundColor: stat.color,
                          transform: hoveredCard === i ? 'translateY(-4px)' : 'translateY(0)',
                          boxShadow: hoveredCard === i ? '0 12px 40px rgba(0, 0, 0, 0.12)' : '0 8px 32px rgba(0, 0, 0, 0.06)'

                        onMouseEnter={() => setHoveredCard(i)}
                        onMouseLeave={() => setHoveredCard(null)}

                        <div style={styles.statValue}>{stat.value}</div>
                        <div style={styles.statLabel}>{stat.label}</div>

                  </div>
                  <div style={styles.activityList}>

                          <div style={styles.activityDot}></div>

                          borderColor: todo.checked ? '#C4A882' : '#D4C4B0'

                        <span style={{
                          ...styles.todoText,
                          textDecoration: todo.checked ? 'line-through' : 'none',
                          color: todo.checked ? '#9B9B9B' : '#2C2C2C'

                      </div>

                        </div>
                        <div style={styles.upcomingContent}>
                          <div style={styles.upcomingTitle}>{item.title}</div>

                    ))}
                  </div>

                <div style={styles.miniCalendar}>
                  <div style={styles.calendarHeader}>2026年 5月</div>
                  <div style={styles.calendarGrid}>
                    {['日', '一', '二', '三', '四', '五', '六'].map(d => (
                      <div key={d} style={styles.calendarDayLabel}>{d}</div>
                    ))}
                    {Array.from({length: 31}, (_, i) => i + 1).map(day => (
                      <div key={day} style={{
                        ...styles.calendarDay,
                        background: [8, 10, 15].includes(day) ? '#C4A882' : 'transparent',
                        color: [8, 10, 15].includes(day) ? 'white' : '#2C2C2C'
                      }}>{day}</div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </main>
